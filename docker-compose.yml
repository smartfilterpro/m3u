version: "3.8"

services:
  m3u8-extractor:
    build:
      context: .
    container_name: m3u8-extractor
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - CHROMIUM_PATH=/usr/bin/chromium
      - PORT=3000
    # Required for Chromium to run in Docker on Synology
    security_opt:
      - seccomp:unconfined
    shm_size: "1gb"
